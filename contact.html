<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Me - Erica Travels</title>

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:#f4f7fb;
    color:#222;
}

/* NAVBAR */

header{
    width:100%;
    background:white;
    padding:22px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 20px rgba(0,0,0,0.05);
}

.logo{
    font-family:'Cinzel', serif;
    font-size:32px;
    font-weight:700;
}

nav{
    display:flex;
    gap:35px;
}

nav a{
    text-decoration:none;
    color:#222;
    font-size:17px;
    font-weight:500;
    transition:0.3s;
}

nav a:hover{
    color:#1976d2;
}

.social-icons{
    display:flex;
    gap:20px;
    font-size:23px;
}

.social-icons i{
    cursor:pointer;
    transition:0.3s;
}

.social-icons i:hover{
    transform:translateY(-4px);
    color:#1976d2;
}

/* HEADER SECTION */

.contact-header{
    text-align:center;
    padding:90px 20px 60px;
    background:linear-gradient(to right,#edf4ff,#ffffff);
}

.contact-header h1{
    font-size:72px;
    font-family:'Cinzel', serif;
    margin-bottom:15px;
}

.contact-header p{
    font-size:22px;
    color:#666;
}

/* CONTACT SECTION */

.contact-section{
    max-width:1400px;
    margin:auto;
    padding:70px 50px;
    display:flex;
    gap:70px;
    align-items:center;
    flex-wrap:wrap;
}

.form-column{
    flex:1;
    min-width:320px;
    background:white;
    padding:50px;
    border-radius:35px;
    box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

.image-column{
    flex:1;
    min-width:320px;
}

.image-column img{
    width:100%;
    height:700px;
    object-fit:cover;
    border-radius:35px;
    box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

/* FORM */

.form-group{
    margin-bottom:30px;
}

.form-group label{
    display:block;
    margin-bottom:10px;
    font-size:18px;
    font-weight:500;
}

.form-group input,
.form-group textarea{
    width:100%;
    padding:18px 22px;
    border:1px solid #ddd;
    border-radius:18px;
    font-size:17px;
    font-family:'Poppins', sans-serif;
    background:#fafafa;
    transition:0.3s;
}

.form-group input:focus,
.form-group textarea:focus{
    outline:none;
    border-color:#1976d2;
    background:white;
    box-shadow:0 0 10px rgba(25,118,210,0.2);
}

.form-group textarea{
    min-height:180px;
    resize:none;
}

.send-btn{
    background:linear-gradient(to right,#1976d2,#42a5f5);
    color:white;
    border:none;
    padding:18px 45px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.send-btn:hover{
    transform:translateY(-4px);
}

/* CONNECT SECTION */

.connect-section{
    padding:80px 20px;
    text-align:center;
}

.connect-section h2{
    font-family:'Cinzel', serif;
    font-size:48px;
    margin-bottom:40px;
}

.social-links{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.social-links a{
    text-decoration:none;
    background:white;
    color:#222;
    padding:18px 30px;
    border-radius:60px;
    font-size:20px;
    display:flex;
    align-items:center;
    gap:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    transition:0.3s;
}

.social-links a:hover{
    background:#1976d2;
    color:white;
    transform:translateY(-5px);
}

/* FOOTER */

footer{
    background:#0d4b86;
    color:white;
    padding:70px 50px;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:50px;
}

.footer-logo h1{
    font-family:'Cinzel', serif;
    font-size:42px;
}

.footer-logo p{
    margin-top:12px;
    font-size:20px;
}

.quick-links h2{
    font-family:'Cinzel', serif;
    font-size:34px;
    margin-bottom:18px;
}

.quick-links a{
    display:block;
    text-decoration:none;
    color:white;
    margin:8px 0;
    font-size:18px;
}

.quick-links a:hover{
    color:#90caf9;
}

.footer-icons{
    display:flex;
    gap:22px;
    font-size:32px;
    margin-top:20px;
}

.footer-icons i{
    transition:0.3s;
    cursor:pointer;
}

.footer-icons i:hover{
    color:#90caf9;
    transform:translateY(-4px);
}

/* RESPONSIVE */

@media(max-width:1100px){

    header{
        flex-direction:column;
        gap:20px;
    }

    nav{
        flex-wrap:wrap;
        justify-content:center;
    }

    .contact-section{
        flex-direction:column;
        padding:50px 25px;
    }

    .image-column img{
        height:500px;
    }

    .contact-header h1{
        font-size:52px;
    }

    .social-links{
        flex-direction:column;
        align-items:center;
    }

}

</style>

</head>

<body>

<header>

<div class="logo">
ERICA TRAVELS ✈️
</div>

<nav>

</div>

<!-- FOOTER -->

<footer>

<div class="footer-logo">

<h1>ERICA TRAVELS</h1>

<p>Travel, Explore, Inspire</p>

</div>

<div class="quick-links">

<h2>Quick Link</h2>

<a href="destination.html">Destination</a>

</div>

<div>

<h2>Follow Me</h2>

</body>
</html>
